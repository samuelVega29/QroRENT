<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Login - QroRent</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #d6dce8;
      background-image:
              radial-gradient(ellipse at 20% 50%, rgba(26,46,90,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.1) 0%, transparent 50%);
      font-family: 'Nunito', sans-serif;
      padding: 24px;
    }
    .card {
      display: flex;
      width: min(1000px, 100%);
      min-height: 560px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.22);
    }
    .panel-left {
      flex: 0 0 420px;
      background: #1a2e5a;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 52px 44px 0;
      overflow: hidden;
    }
    .wave-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
    }
    .panel-left h1 {
      color: #fff;
      font-size: 34px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 18px;
    }
    .panel-left p {
      color: rgba(255,255,255,0.75);
      font-size: 15px;
      font-weight: 600;
    }
    .house-wrap {
      margin-top: auto;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    .house-wrap svg {
      width: 240px;
      height: auto;
    }
    .panel-right {
      flex: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 64px;
    }
    .panel-right h2 {
      font-size: 26px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 32px;
      text-align: center;
    }
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 7px;
      letter-spacing: 0.02em;
    }
    .field input {
      width: 100%;
      height: 48px;
      border: 1.5px solid #d0d5e8;
      border-radius: 10px;
      padding: 0 16px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      color: #1a1a2e;
      background: #f0f3fb;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: #1a2e5a;
    }
    .alert {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
    }
    .alert-error { background: #fee2e2; color: #b91c1c; }
    .alert-success { background: #dcfce7; color: #15803d; }
    .btn-primary {
      width: 100%;
      height: 50px;
      background: #1a2e5a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #243d7a; }
    .btn-primary:active { transform: scale(0.98); }
    .link-row {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: #666;
    }
    .link-row a {
      color: #1a2e5a;
      font-weight: 700;
      text-decoration: none;
    }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="panel-left">
    <h1>Tu próxima historia<br>comienza aquí</h1>
    <p>No solo es un espacio, es un hogar</p>
    <div class="house-wrap">
      <svg viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="26" cy="120" rx="16" ry="22" fill="#4ade80" opacity=".9"/>
        <rect x="23" y="136" width="6" height="20" rx="3" fill="#a16207"/>
        <rect x="54" y="90" width="110" height="80" rx="6" fill="#fef9c3"/>
        <polygon points="46,92 109,46 172,92" fill="#a78bfa"/>
        <rect x="93" y="130" width="28" height="40" rx="4" fill="#7c3aed"/>
        <rect x="60" y="105" width="26" height="22" rx="4" fill="#bae6fd"/>
        <line x1="73" y1="105" x2="73" y2="127" stroke="#7c3aed" stroke-width="1.5"/>
        <line x1="60" y1="116" x2="86" y2="116" stroke="#7c3aed" stroke-width="1.5"/>
        <rect x="132" y="105" width="26" height="22" rx="4" fill="#bae6fd"/>
        <line x1="145" y1="105" x2="145" y2="127" stroke="#7c3aed" stroke-width="1.5"/>
        <line x1="132" y1="116" x2="158" y2="116" stroke="#7c3aed" stroke-width="1.5"/>
        <path d="M107 66 C107 62 111 59 115 62 C119 59 123 62 123 66 C123 70 115 76 115 76 C115 76 107 70 107 66Z" fill="#f9a8d4"/>
        <rect x="148" y="56" width="14" height="22" rx="2" fill="#a78bfa"/>
        <rect x="40" y="168" width="130" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
      </svg>
    </div>
    <svg class="wave-bottom" viewBox="0 0 360 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0 30 Q45 0 90 30 Q135 60 180 30 Q225 0 270 30 Q315 60 360 30 L360 60 L0 60 Z" fill="#fff"/>
    </svg>
  </div>

  <div class="panel-right">
    <h2>Inicia sesión</h2>

    <form method="post" th:action="@{/login}">
      <div th:if="${param.error}" class="alert alert-error">
        Credenciales incorrectas. Intenta de nuevo.
      </div>
      <div th:if="${param.logout}" class="alert alert-success">
        Has cerrado sesión correctamente.
      </div>
      <div th:if="${param.registered}" class="alert alert-success">
        Cuenta creada. ¡Ya puedes iniciar sesión!
      </div>

      <div class="field">
        <label for="email">Correo:</label>
        <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com"/>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="••••••••"/>
      </div>

      <button type="submit" class="btn-primary">Inicia sesión</button>
    </form>

    <p class="link-row">
      ¿Aún no tienes cuenta? <a th:href="@{/registro}" href="/registro">Regístrate aquí</a>
    </p>
  </div>
</div>

</body>
</html>
